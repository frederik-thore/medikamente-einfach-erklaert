<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Medikamente einfach erklärt – lokale Testversion." />
    <title>Einfach erklärt</title>
    <link rel="stylesheet" href="styles.css?v=20260721-3" />
  </head>
  <body>
    <main class="page-shell">
      <header class="site-header">
        <h1>Medikamente.<br /><span>Einfach erklärt.</span></h1>
        <p class="intro">Verstehen, wofür ein Medikament da ist.</p>
      </header>

      <section class="notice" aria-label="Wichtiger Hinweis">
        Ergänzt ärztliche und apothekerliche Beratung.
      </section>

      <section aria-labelledby="search-heading">
        <div class="section-heading">
          <h2 id="search-heading">Medikament suchen</h2>
          <label class="search" for="search-input">
            <span aria-hidden="true">⌕</span>
            <input id="search-input" type="search" placeholder="Handelsname, Wirkstoff oder Präparat eingeben" autocomplete="off" />
          </label>
        </div>
        <label class="filter-label" for="category-filter">
          <span class="visually-hidden">Medikamentengruppe</span>
          <select id="category-filter">
            <option value="">Alle Bereiche</option>
          </select>
        </label>
        <div id="search-status" class="search-status" aria-live="polite"></div>
        <div id="medication-list" class="medication-list" aria-label="Medikamente"></div>
      </section>

      <section id="detail-view" class="detail-view" hidden aria-live="polite"></section>
    </main>
    <script src="app.js?v=20260723-2"></script>
  </body>
</html>
